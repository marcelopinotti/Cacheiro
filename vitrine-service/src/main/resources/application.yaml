server:
  port: 8080

spring:
  application:
    name: vitrine-service
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: 6379

vitrine:
  catalogo-url: ${CATALOGO_URL:http://localhost:8081}
  # Folga sobre catalogo.latencia-simulada-ms=300; soma < TTL 5s do lock anti-stampede
  catalogo-timeout-conexao: 1s
  catalogo-timeout-leitura: 3s
  cache:
    ttl-produto: 45s
    ttl-lista: 20s
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
