name: CI
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
jobs:
  catalogo:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: catalogo-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - run: mvn --batch-mode clean verify
  vitrine:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vitrine-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - run: mvn --batch-mode clean verify
  pedidos:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pedido-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - run: go build ./...
      - run: go test ./...
